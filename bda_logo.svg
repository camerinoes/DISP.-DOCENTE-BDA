<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <!-- Fondo navy BDA -->
  <rect width="520" height="160" fill="#1A3557"/>

  <!-- Arco cobre -->
  <path d="M 30 138 Q 200 20 460 55" stroke="#C07838" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Punto izquierdo -->
  <circle cx="30" cy="138" r="7" fill="#C07838"/>
  <!-- Punto derecho -->
  <circle cx="460" cy="55" r="7" fill="#C07838"/>

  <!-- BDA en blanco, serif grande -->
  <text x="28" y="135" font-family="Georgia, 'Times New Roman', serif" font-size="118" font-weight="bold" fill="white" letter-spacing="-2">BDA</text>

  <!-- Línea separadora vertical -->
  <rect x="300" y="52" width="2.5" height="72" fill="#8A9BB0"/>

  <!-- ANALYTICS -->
  <text x="316" y="95" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="300" fill="white" letter-spacing="6">ANALYTICS</text>

  <!-- Lima, Perú -->
  <text x="318" y="122" font-family="Georgia, 'Times New Roman', serif" font-size="19" fill="#C07838" font-style="italic">Lima, Perú</text>
</svg>
